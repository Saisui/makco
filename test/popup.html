<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 400px;
      max-height: 500px;
      font-family: sans-serif;
      margin: 0;
      padding: 10px;
    }
    h3 {
      margin: 0 0 8px 0;
      font-size: 16px;
    }
    .section {
      margin-bottom: 15px;
      border-bottom: 1px solid #ccc;
      padding-bottom: 10px;
    }
    .resource-list {
      max-height: 200px;
      overflow-y: auto;
      font-size: 12px;
    }
    .resource-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
      padding: 4px;
      background: #f5f5f5;
      border-radius: 4px;
    }
    .resource-url {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-right: 8px;
    }
    button {
      background: #4caf50;
      color: white;
      border: none;
      border-radius: 3px;
      padding: 2px 8px;
      cursor: pointer;
      font-size: 11px;
    }
    button:hover {
      background: #45a049;
    }
    .loading {
      text-align: center;
      color: #666;
    }
    .error {
      color: red;
    }
  </style>
</head>
<body>
  <h3>媒体资源下载器</h3>
  <div id="content">
    <div class="loading">加载中...</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
